<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,minimal-ui,viewport-fit=cover" />
  <title>Codex Usage</title>
  <link rel="stylesheet" href="../libs/css/uspi.css">
  <style>
    .panel { padding: 8px 12px; font-size: 12px; line-height: 1.5; }
    .panel p { margin: 0 0 8px; opacity: 0.85; }
    .panel .muted { opacity: 0.6; font-size: 11px; }
  </style>
</head>
<body>
  <div class="udpi-wrapper hidden uspi-wrapper">
    <form id="property-inspector">
      <div class="uspi-item">
        <div class="uspi-item-label" data-localize="colorModeLabel">Accent color</div>
        <select class="uspi-item-value" name="colorMode" id="colorMode">
          <option value="none" data-localize="colorModeNone">None</option>
          <option value="custom" data-localize="colorModeCustom">Custom…</option>
        </select>
      </div>

      <div class="uspi-item" id="colorRow" style="display:none;">
        <div class="uspi-item-label" data-localize="colorLabel">Color</div>
        <input class="uspi-item-value" type="color" name="color" id="color" value="#10a37f" />
      </div>

      <div class="panel">
        <p class="muted" data-localize="colorHint">Optional thin stripe across the top of the button.</p>
        <p class="muted" data-localize="authHint">Reads ~/.codex/auth.json (ChatGPT login). Click the button to force a refresh.</p>
      </div>
    </form>
  </div>

  <script src="../libs/js/constants.js"></script>
  <script src="../libs/js/eventEmitter.js"></script>
  <script src="../libs/js/timers.js"></script>
  <script src="../libs/js/utils.js"></script>
  <script src="../libs/js/ulanziApi.js"></script>
  <script src="./inspector.js"></script>
</body>
</html>
